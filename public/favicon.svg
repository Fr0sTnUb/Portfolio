<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0f1629;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0e1a;stop-opacity:1" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="1.2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="url(#bgGrad)"/>

  <!-- Border -->
  <rect width="32" height="32" rx="6" fill="none" stroke="#00d4ff" stroke-width="0.8" opacity="0.4"/>

  <!-- Corner brackets - top left -->
  <path d="M3 8 L3 3 L8 3" fill="none" stroke="#00d4ff" stroke-width="1.2" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Corner brackets - top right -->
  <path d="M24 3 L29 3 L29 8" fill="none" stroke="#00d4ff" stroke-width="1.2" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Corner brackets - bottom left -->
  <path d="M3 24 L3 29 L8 29" fill="none" stroke="#7c3aed" stroke-width="1.2" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Corner brackets - bottom right -->
  <path d="M24 29 L29 29 L29 24" fill="none" stroke="#7c3aed" stroke-width="1.2" stroke-linecap="round" filter="url(#glow)"/>

  <!-- F letter - bold monospace style -->
  <g filter="url(#glowStrong)">
    <!-- F vertical bar -->
    <rect x="9" y="8" width="2.2" height="16" rx="0.4" fill="#00d4ff"/>
    <!-- F top horizontal -->
    <rect x="9" y="8" width="9" height="2.2" rx="0.4" fill="#00d4ff"/>
    <!-- F middle horizontal -->
    <rect x="9" y="14.9" width="7" height="2.2" rx="0.4" fill="#00d4ff"/>
  </g>

  <!-- Accent dot - cyan -->
  <circle cx="22" cy="10" r="1.5" fill="#00d4ff" filter="url(#glow)" opacity="0.9"/>
  <!-- Accent dot - purple -->
  <circle cx="22" cy="22" r="1.5" fill="#7c3aed" filter="url(#glow)" opacity="0.9"/>

  <!-- Small data line accents -->
  <line x1="20" y1="16" x2="24" y2="16" stroke="#10b981" stroke-width="1" opacity="0.7" filter="url(#glow)"/>
  <line x1="21" y1="14" x2="24" y2="14" stroke="#10b981" stroke-width="0.7" opacity="0.4"/>
  <line x1="21" y1="18" x2="24" y2="18" stroke="#10b981" stroke-width="0.7" opacity="0.4"/>
</svg>
